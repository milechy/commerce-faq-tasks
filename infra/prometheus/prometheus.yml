global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "rajiuce-monitor"

scrape_configs:
  - job_name: "rajiuce-app"
    static_configs:
      - targets:
          - "host.docker.internal:3000"
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
