propose:
  - intent: trial_lesson_offer
    name: "料金 → 体験レッスン"
    patterns:
      any:
        - "料金"
        - "値段"
        - "金額"
        - "費用"
        - "プラン"
        - "体験レッスン"
        - "体験"
        - "まずは試したい"
        - "お試し"
        - "一回体験"
      require:
        - "体験"

  - intent: propose_subscription_upgrade
    name: "既存ユーザー向けアップグレード提案"
    patterns:
      any:
        - "プラン変更"
        - "コース変更"
        - "アップグレード"
        - "上位プラン"
        - "もっとレッスン"
        - "回数増やしたい"
        - "今のプラン"
        - "現在のプラン"
        - "今のコース"
        - "以前から利用している"
        - "すでに利用している"
        - "既に利用している"
        - "継続している"

  - intent: propose_monthly_plan_premium
    name: "ビジネス・本気度高め向けプレミアム提案"
    patterns:
      any:
        - "ビジネス英語"
        - "仕事で使いたい"
        - "仕事で英語を使いたい"
        - "会議"
        - "ミーティング"
        - "プレゼン"
        - "商談"
        - "クライアント"
        - "上司"
        - "しっかり学びたい"
        - "本気で"
        - "集中的に"
        - "短期間で伸ばしたい"

  - intent: propose_monthly_plan_basic
    name: "料金 → ベーシックプラン"
    patterns:
      any:
        - "料金"
        - "値段"
        - "金額"
        - "費用"
        - "プラン"
        - "コスト"
        - "安い"
        - "安め"
        - "手頃"
        - "手ごろ"
        - "コスパ"
        - "月額"
        - "無理なく続けられる"
        - "続けやすい"
        - "ベーシックプラン"
        - "まずは始めてみたい"
        - "気軽に始めたい"

  - intent: visit_booking
    name: "来店・試乗予約"
    patterns:
      any:
        - "来店"
        - "予約"
        - "試乗"
        - "見に行きたい"
        - "店舗"

  - intent: financing
    name: "ローン・支払い相談"
    patterns:
      any:
        - "ローン"
        - "オートローン"
        - "金利"
        - "審査"
        - "分割"
        - "頭金"

  - intent: trade_in
    name: "下取り・買取相談"
    patterns:
      any:
        - "下取り"
        - "査定"
        - "買取"
        - "今の車"
        - "乗り換え"

recommend:
  - intent: recommend_course_based_on_level
    name: "レベル・コース相談"
    patterns:
      any:
        - "自分に合うコース"
        - "どのコース"
        - "おすすめのコース"
        - "コース選び"
        - "プラン選び"
        - "コースを知りたい"
        - "プランを知りたい"
        - "レベル"
        - "初級から"
        - "学び直し"
        - "効率よく"
        - "時間がない"

  - intent: recommend_course_for_goal
    name: "目標・ゴール相談（ビジネス・資格含む）"
    patterns:
      any:
        - "目標"
        - "ゴール"
        - "TOEIC"
        - "TOEFL"
        - "英検"
        - "ビジネス英語"
        - "職場"
        - "仕事"
        - "会議"
        - "ミーティング"
        - "メール"
        - "プレゼン"
        - "商談"
        - "クライアント"
        - "上司"
        - "海外出張"
        - "海外赴任"
        - "昇進"
        - "評価"
        - "キャリアアップ"
        - "転職"
        - "英語が必要"

  - intent: vehicle_detail
    name: "車両詳細確認"
    patterns:
      any:
        - "修復歴"
        - "事故歴"
        - "保証"
        - "整備"
        - "状態"
        - "走行距離"

  - intent: after_service
    name: "アフターサービス"
    patterns:
      any:
        - "車検"
        - "アフターサービス"
        - "点検"
        - "保証範囲"
        - "保証期間"

close:
  - intent: close_next_step_confirmation
    name: "次のステップ確認"
    patterns:
      any:
        - "どう進めるのが良さそう"
        - "どう進めるのがよさそう"
        - "どう進める"
        - "次のステップ"
        - "どう始める"
        - "始めたい"
        - "申し込みたい"
        - "申込みたい"
        - "もう始めてもいい"
        - "始めても良い"
        - "始めるべきか"
        - "検討している"
        - "前向きに考えている"
        - "スタートしたい"
        - "始めるか迷っている"
        - "決めきれない"

  - intent: close_after_trial
    name: "体験レッスン後のクロージング"
    patterns:
      any:
        - "体験レッスン"
      require:
        - "どうでした"
        - "受けてみて"
        - "感想"

  - intent: close_handle_objection_price
    name: "価格不安のハンドリング"
    patterns:
      any:
        - "高い"
        - "安くない"
        - "値段が気になる"
        - "料金が気になる"
        - "費用が気になる"
        - "金額が気になる"
        - "続けられるか心配"
        - "もったいない"
        - "コスパ"
        - "元が取れるか"
        - "費用対効果"
        - "金銭的に"
        - "家計"
        - "予算が心配"

  - intent: pricing_negotiation
    name: "価格・見積り交渉"
    patterns:
      any:
        - "値引き"
        - "諸費用"
        - "総額"
        - "乗り出し"
        - "見積もり"
        - "コミコミ"

  - intent: store_trust
    name: "店舗信頼確認"
    patterns:
      any:
        - "口コミ"
        - "評判"
        - "実績"
        - "JU適正"
        - "信頼"
        - "安心"
