<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R2C AI デモ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a12; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    #hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: rgba(255,255,255,0.25);
      font-size: 13px; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="hint">
    <div style="font-size:28px;margin-bottom:8px">💬</div>
    <div>読み込み中...</div>
  </div>

  <script
    src="/widget.js"
    data-api-key="rjc_77aaa951edede3a8faa44161a6f505eca44f4c0517e051ec1f8bb6bc9f22b29b"
    data-tenant="r2c_default"
    data-accent-color="#7c3aed"
    data-greeting="こんにちは！R2Cについて何でも聞いてください 😊"
    data-scripted-responses='[{"keywords":["月","料金","費用","いくら","コスト","価格","いく"],"answer":"R2Cは完全従量課金制です！1対話あたり5円〜で、固定費ゼロ。初月は完全無料なのでリスクなく始められます。"},{"keywords":["日","期間","導入","最短","何日","いつから","スタート"],"answer":"最短3日で本番稼働できます！管理画面でFAQ・URLを登録するだけ。初期設定はR2Cチームが丁寧にサポートします。"},{"keywords":["ec","ショップ","通販","サイト","合い","対応","使え"],"answer":"ECサイトに特に強いです！深夜の商品Q&A対応、カート離脱防止、アップセル誘導を全自動化。導入後に離脱率が下がったケースが多数あります。"},{"keywords":["スタッフ","連携","人間","有人","エスカレーション","引き継"],"answer":"AIが対応しきれない場合はスタッフへシームレスに引き継げます。会話履歴もそのまま共有されるので、お客様に同じ説明を繰り返させません。"},{"keywords":["*"],"answer":"ご質問ありがとうございます！R2Cは1行のコードを貼るだけで、24時間AIが自動接客します。月々の費用は1対話5円〜、初月完全無料です。導入期間は最短3日。ぜひお気軽にご相談ください！"}]'
  ></script>

  <script>
    var widgetReady = false;

    function getWidgetShadow() {
      var host = document.getElementById('faq-chat-widget-host');
      if (!host) {
        var divs = document.body.querySelectorAll('div');
        for (var i = 0; i < divs.length; i++) {
          if (divs[i].shadowRoot) { host = divs[i]; break; }
        }
      }
      return host ? host.shadowRoot : null;
    }

    function openWidget() {
      window.postMessage({ source: 'faq-widget-host', type: 'open' }, window.location.origin);
      document.getElementById('hint').classList.add('hidden');
      widgetReady = true;
    }

    function injectText(text) {
      var shadow = getWidgetShadow();
      if (!shadow) return;
      var textarea = shadow.querySelector('textarea');
      if (!textarea) return;

      if (!widgetReady) openWidget();

      setTimeout(function() {
        var shadow2 = getWidgetShadow();
        if (!shadow2) return;
        var ta = shadow2.querySelector('textarea');
        if (!ta) return;
        ta.value = text;
        ta.dispatchEvent(new Event('input', { bubbles: true }));
        var sendBtn = shadow2.querySelector('.send-btn');
        if (sendBtn && !sendBtn.disabled) {
          setTimeout(function() { sendBtn.click(); }, 100);
        }
      }, 300);
    }

    // LP 親ページからの質問注入を受け取る
    window.addEventListener('message', function(e) {
      if (e.origin !== window.location.origin) return;
      var d = e.data;
      if (!d || typeof d !== 'object' || d.source !== 'faq-widget-host') return;
      if (d.type === 'send' && typeof d.text === 'string') {
        injectText(d.text);
      }
    });

    // ウィジェット初期化完了後にパネルを自動展開
    setTimeout(openWidget, 1200);
  </script>
</body>
</html>
