<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カーネーション AI コンシェルジュ テスト</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #dc2626;
        --accent-soft: #fee2e2;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 20px 16px 120px;
      }
      .hero {
        border: 1px solid #fecaca;
        background: linear-gradient(180deg, #fff 0%, #fff5f5 100%);
        border-radius: 14px;
        padding: 20px 16px;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #991b1b;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      .welcome {
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
      }
      .examples {
        margin-top: 18px;
      }
      .examples h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .example-list {
        display: grid;
        gap: 10px;
      }
      .example-btn {
        min-height: 44px;
        border: 1px solid #fca5a5;
        border-radius: 10px;
        background: #fff;
        color: #991b1b;
        font-size: 16px;
        padding: 10px 14px;
        text-align: left;
        cursor: pointer;
      }
      .example-btn:hover {
        background: #fff1f2;
      }
      .note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <span class="badge">Phase26 Carnation Test</span>
        <h1>カーネーション チャットテスト</h1>
        <p class="welcome">
          カーネーションのAIコンシェルジュです。お車のことならお気軽にどうぞ！
        </p>
      </section>

      <section class="examples">
        <h2>質問例</h2>
        <div class="example-list">
          <button class="example-btn" type="button" data-question="来店予約したい">
            来店予約したい
          </button>
          <button class="example-btn" type="button" data-question="ローンについて知りたい">
            ローンについて知りたい
          </button>
          <button class="example-btn" type="button" data-question="下取りの流れは？">
            下取りの流れは？
          </button>
        </div>
        <p class="note">
          ボタンを押すとウィジェットを開いて質問文を入力します。送信ボタンで送信してください。
        </p>
      </section>
    </main>

    <script
      src="/widget.js"
      data-tenant="carnation"
      data-api-key="secret-123"
      async
    ></script>
    <script>
      (function () {
        function fillWidgetInput(text) {
          var host = document.getElementById("faq-chat-widget-host");
          if (!host || !host.shadowRoot) return false;
          var textarea = host.shadowRoot.querySelector("textarea");
          if (!textarea) return false;
          textarea.value = text;
          textarea.dispatchEvent(new Event("input", { bubbles: true }));
          return true;
        }

        function openWidget() {
          if (window.FaqWidget && typeof window.FaqWidget.open === "function") {
            window.FaqWidget.open();
          }
        }

        function handleExampleClick(event) {
          var button = event.currentTarget;
          if (!button) return;
          var question = button.getAttribute("data-question") || "";
          openWidget();
          setTimeout(function () {
            fillWidgetInput(question);
          }, 150);
        }

        var buttons = document.querySelectorAll(".example-btn");
        buttons.forEach(function (button) {
          button.addEventListener("click", handleExampleClick);
        });
      })();
    </script>
  </body>
</html>
