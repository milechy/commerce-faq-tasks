<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫一覧 - BROSS新潟 [DEMO]</title>
  <link rel="stylesheet" href="common.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">🚗 BROSS新潟</a>
      <nav>
        <a href="index.html">ホーム</a>
        <a href="stock.html">在庫一覧</a>
        <a href="reservation.html">試乗予約</a>
        <a href="inquiry.html">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>在庫一覧</h1>
        <p>全5台掲載中 ・ 全車保証付き</p>
      </div>
    </div>

    <div class="container" style="padding-bottom: 48px;">
      <div class="grid" id="car-list"></div>
    </div>
  </main>

  <footer>
    <p>© BROSS新潟 中古車販売<span class="demo-badge">DEMO - 検証用環境</span></p>
  </footer>

  <script>
    var cars = [
      { id: 1, name: 'トヨタ ハリアー',     year: 2020, price: 2890000, color: 'ホワイトパール', mileage: '3.2万km' },
      { id: 2, name: 'ホンダ ヴェゼル',     year: 2021, price: 2390000, color: 'ブラック',       mileage: '1.8万km' },
      { id: 3, name: '日産 エクストレイル', year: 2019, price: 2490000, color: 'シルバー',       mileage: '5.6万km' },
      { id: 4, name: 'マツダ CX-5',        year: 2022, price: 3190000, color: 'ソウルレッド',   mileage: '0.9万km' },
      { id: 5, name: 'スバル フォレスター', year: 2020, price: 2690000, color: 'ブルー',         mileage: '4.1万km' },
    ];

    var container = document.getElementById('car-list');
    cars.forEach(function(car) {
      var card = document.createElement('div');
      card.className = 'car-card';
      card.innerHTML =
        '<div class="car-card-image">🚗 ' + car.name + '</div>' +
        '<div class="car-card-body">' +
          '<div class="car-card-name">' + car.name + '</div>' +
          '<div class="car-card-price">' + (car.price / 10000).toFixed(0) + '万円</div>' +
          '<div class="car-card-meta">' +
            '<span>📅 ' + car.year + '年</span>' +
            '<span>🛣 ' + car.mileage + '</span>' +
          '</div>' +
          '<div class="car-card-meta" style="margin-bottom: 0;">' +
            '<span>🎨 ' + car.color + '</span>' +
          '</div>' +
          '<div style="margin-top: 16px;">' +
            '<a href="stock-detail.html?id=' + car.id + '" class="btn-primary" style="width: 100%;">詳細を見る</a>' +
          '</div>' +
        '</div>';
      container.appendChild(card);
    });
  </script>

  <script
    src="/widget.js"
    data-tenant="carnation"
    data-api-key="rjc_6c2d11a0097425b875b81d9a9b7c5c68afc20f8c37ae5dc984400e66c35ab37f"
    async
  ></script>
</body>
</html>
