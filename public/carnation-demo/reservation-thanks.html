  <main>
    <div class="thanks-container">
      <div class="thanks-icon">🚗</div>
      <h1>試乗予約を受け付けました</h1>
      <p>
        ご予約内容を確認の上、担当スタッフよりご連絡いたします。<br>
        当日は10分前にお越しいただけますとスムーズです。

  <script
    src="/widget.js"
    data-tenant="carnation"
    data-api-key="rjc_6c2d11a0097425b875b81d9a9b7c5c68afc20f8c37ae5dc984400e66c35ab37f"
    async
  ></script>

  <script>
  window.addEventListener('load', function() {
    var attempts = 0;
    var interval = setInterval(function() {
      attempts++;
      if (typeof window.r2c !== 'undefined' && typeof window.r2c.trackConversion === 'function') {
        clearInterval(interval);
        try {
          window.r2c.trackConversion('reservation', 0);
          console.log('[demo] reservation CV fired');
          document.getElementById('cv-status').textContent = '✅ CV記録: reservation';
        } catch(e) {
          document.getElementById('cv-status').textContent = '❌ CV失敗: ' + e.message;
        }
      } else if (attempts >= 50) {
        clearInterval(interval);
        document.getElementById('cv-status').textContent = '⚠️ r2c未ロード';
      }
    }, 100);
  });
  </script>
</body>
