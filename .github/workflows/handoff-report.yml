name: hk 引き渡しレポート (Phase D)

on:
  # PR が review_requested になったとき自動投稿
  pull_request:
    types: [review_requested]
  # 手動トリガー（PR番号を指定してレポートを再投稿）
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR番号（例: 123）'
        required: true
        type: string

jobs:
  handoff-report:
    name: hk 引き渡しレポート投稿
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      # ─── Gate 1: typecheck + test ────────────────────────────────────────
      - name: Gate 1 — typecheck + test
        id: gate1
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          if pnpm typecheck && pnpm test; then
            echo "status=✅" >> "$GITHUB_OUTPUT"
            echo "detail=typecheck 0 errors · tests passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌" >> "$GITHUB_OUTPUT"
            echo "detail=Gate 1 FAIL" >> "$GITHUB_OUTPUT"
          fi

      # ─── Gate 3: build ──────────────────────────────────────────────────
      - name: Gate 3 — build
        id: gate3
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
        run: |
          if pnpm build && (cd admin-ui && pnpm install --frozen-lockfile && pnpm build); then
            echo "status=✅" >> "$GITHUB_OUTPUT"
            echo "detail=backend OK · admin-ui OK" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌" >> "$GITHUB_OUTPUT"
            echo "detail=build FAIL" >> "$GITHUB_OUTPUT"
          fi

      # ─── Gate 8: integration smoke ──────────────────────────────────────
      - name: Gate 8 — integration smoke
        id: gate8
        env:
          API_URL: https://api.r2c.biz
        run: |
          if bash SCRIPTS/gate-8-integration-smoke.sh; then
            echo "status=✅" >> "$GITHUB_OUTPUT"
            echo "detail=smoke 5/5 PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌" >> "$GITHUB_OUTPUT"
            echo "detail=smoke FAIL" >> "$GITHUB_OUTPUT"
          fi

      # ─── Gate 8.5: scenario smoke ────────────────────────────────────────
      - name: Gate 8.5 — scenario smoke
        id: gate8_5
        env:
          API_URL: https://api.r2c.biz
          E2E_TEST_API_KEY: ${{ secrets.E2E_TEST_API_KEY }}
          E2E_TEST_TENANT_ID: ${{ secrets.E2E_TEST_TENANT_ID }}
        run: |
          if [[ -z "${{ secrets.E2E_TEST_API_KEY }}" ]]; then
            echo "status=⏭" >> "$GITHUB_OUTPUT"
            echo "detail=E2E_TEST_API_KEY 未設定" >> "$GITHUB_OUTPUT"
          elif bash SCRIPTS/gate-8.5-scenario-smoke.sh; then
            echo "status=✅" >> "$GITHUB_OUTPUT"
            echo "detail=シナリオ PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌" >> "$GITHUB_OUTPUT"
            echo "detail=シナリオ smoke FAIL" >> "$GITHUB_OUTPUT"
          fi

      # ─── Phase A: E2E ────────────────────────────────────────────────────
      - name: Phase A — auth setup
        env:
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          E2E_ENABLED: '1'
        run: npx playwright test --project=setup

      - name: Phase A — E2E tests
        id: e2e
        env:
          E2E_ENABLED: '1'
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          if npx playwright test --project=admin-ui --project=chromium; then
            echo "status=✅" >> "$GITHUB_OUTPUT"
            echo "detail=全スペック PASS" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌" >> "$GITHUB_OUTPUT"
            echo "detail=E2E FAIL — artifacts を確認" >> "$GITHUB_OUTPUT"
          fi

      # ─── Phase C: visual regression ──────────────────────────────────────
      - name: Phase C — visual regression
        id: visual
        env:
          E2E_ENABLED: '1'
        run: |
          BASELINE_DIR="tests/e2e/__screenshots__"
          if [ -d "${BASELINE_DIR}" ] && [ -n "$(ls -A "${BASELINE_DIR}" 2>/dev/null)" ]; then
            if npx playwright test --project=admin-ui tests/e2e/visual-regression.spec.ts; then
              echo "status=✅" >> "$GITHUB_OUTPUT"
              echo "detail=差分なし" >> "$GITHUB_OUTPUT"
            else
              echo "status=❌" >> "$GITHUB_OUTPUT"
              echo "detail=差分あり — artifacts でスクリーンショット確認" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "status=⏭" >> "$GITHUB_OUTPUT"
            echo "detail=baseline 未作成" >> "$GITHUB_OUTPUT"
          fi

      # ─── PR コメント投稿 ─────────────────────────────────────────────────
      - name: PR コメント投稿
        uses: actions/github-script@v7
        env:
          GATE1_STATUS: ${{ steps.gate1.outputs.status }}
          GATE1_DETAIL: ${{ steps.gate1.outputs.detail }}
          GATE3_STATUS: ${{ steps.gate3.outputs.status }}
          GATE3_DETAIL: ${{ steps.gate3.outputs.detail }}
          GATE8_STATUS: ${{ steps.gate8.outputs.status }}
          GATE8_DETAIL: ${{ steps.gate8.outputs.detail }}
          GATE8_5_STATUS: ${{ steps.gate8_5.outputs.status }}
          GATE8_5_DETAIL: ${{ steps.gate8_5.outputs.detail }}
          E2E_STATUS: ${{ steps.e2e.outputs.status }}
          E2E_DETAIL: ${{ steps.e2e.outputs.detail }}
          VISUAL_STATUS: ${{ steps.visual.outputs.status }}
          VISUAL_DETAIL: ${{ steps.visual.outputs.detail }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const prNumber = context.payload.pull_request?.number
              || Number(context.payload.inputs?.pr_number);

            if (!prNumber) {
              console.log('PR番号が取得できませんでした');
              return;
            }

            const g = process.env;
            const shortSha = g.SHA.substring(0, 7);
            const runUrl = `https://github.com/${g.REPO}/actions/runs/${g.RUN_ID}`;
            const allPass = [g.GATE1_STATUS, g.GATE3_STATUS, g.GATE8_STATUS, g.E2E_STATUS]
              .every(s => s === '✅');
            const summary = allPass
              ? '✅ CLI 自動チェック全通過 — 以下のみ目視確認お願いします'
              : '⚠️ 一部 Gate に問題あり — 詳細を確認してください';

            const body = [
              '## 👀 hk 引き渡しレポート',
              '',
              summary,
              '',
              '| Gate | 結果 | 詳細 |',
              '|---|---|---|',
              `| Gate 1: typecheck + test | ${g.GATE1_STATUS} | ${g.GATE1_DETAIL} |`,
              `| Gate 3: build | ${g.GATE3_STATUS} | ${g.GATE3_DETAIL} |`,
              `| Gate 8: integration smoke | ${g.GATE8_STATUS} | ${g.GATE8_DETAIL} |`,
              `| Gate 8.5: scenario smoke | ${g.GATE8_5_STATUS} | ${g.GATE8_5_DETAIL} |`,
              `| Phase A: E2E (Playwright) | ${g.E2E_STATUS} | ${g.E2E_DETAIL} |`,
              `| Phase C: visual regression | ${g.VISUAL_STATUS} | ${g.VISUAL_DETAIL} |`,
              '',
              `**Commit:** \`${shortSha}\` | [Actions ログ・Playwright レポート](${runUrl})`,
              '',
              '### ✋ hk 確認ポイント（CLI 自動化不可の範囲のみ）',
              '',
              '- [ ] Admin UI ログイン成功 → ダッシュボード表示',
              '- [ ] 今回の Phase 固有機能の動作確認',
              '- [ ] 390px モバイル表示崩れなし',
              '- [ ] DevTools コンソールエラーなし',
              '',
              '> Gate 1・3・8・8.5・E2E は CI で自動検証済みです 🙏',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handoff-playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
