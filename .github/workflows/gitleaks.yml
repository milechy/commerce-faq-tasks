# Gitleaks — 本物のシークレットスキャン (blocking)
#
# security-scan.sh の自前 grep (sk_live_/password=/PRIVATE_KEY のみ) を補完し、
# エントロピー + ルールベースで実シークレット漏洩を検知する。
# 既知の誤検知 (Asana GID / demo key / test fixture) は .gitleaks.toml で allowlist 済み。
#   ポリシー: docs/GITLEAKS_ALLOWLIST_POLICY.md
#
# job 名 "gitleaks" は ci-auto-merge.sh の DEFAULT_REQUIRED と一致させること
# (改名すると auto-merge が必須チェック欠落で永久停止する)。

name: Gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # PR の全コミットを履歴ごとスキャンするため full fetch
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # .gitleaks.toml (リポジトリ root) を自動使用。User アカウントのため license 不要。
          GITLEAKS_CONFIG: .gitleaks.toml
